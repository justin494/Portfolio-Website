<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="HandheldFriendly" content="true">
    <title>Home</title>
</head>
<style>
    /* Media Queries: Tablet Landscape */
    
    img {
        max-width: 100%;
        height: auto;
    }
    
    @media (min-device-width:600px) {
        img[data-src-600px] {
            content: attr(data-src-600px, url);
        }
    }
    
    @media (min-device-width:800px) {
        img[data-src-800px] {
            content: attr(data-src-800px, url);
        }
    }
    
    @media screen and (max-width: 1060px) {
        #primary {
            width: 67%;
        }
        #secondary {
            width: 30%;
            margin-left: 3%;
        }
    }
    /* Media Queries: Tabled Portrait */
    
    @media screen and (max-width: 768px) {
        #primary {
            width: 100%;
        }
        #secondary {
            width: 100%;
            margin: 0;
            border: none;
        }
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: Arial, Helvetica, sans-serif;
    }
    
    a {
        text-decoration: none;
    }
    
    li {
        list-style: none;
    }
    
    .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        background-color: rgb(0, 0, 0);
        color: #fff;
    }
    
    .nav-links a {
        color: rgb(128, 128, 128);
    }
    
    .logo {
        font-size: 32px;
    }
    
    .menu {
        display: flex;
        gap: 1em;
        font-size: 18px;
    }
    
    .menu li:hover {
        background-color: #030303;
        border-radius: 5px;
        transition: 0.3s ease;
    }
    
    .menu li {
        padding: 5px 14px;
    }
    
    a:hover {
        color: #ffffff;
    }
    
    .bgimage {
        height: 100vh;
        background: url('home3.jpg');
        filter: blur(5px);
        -webkit-filter: blur(5px);
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
    }
    
    .hero_title {
        font-size: 4.5rem;
    }
    
    .hero_desc {
        font-size: 2rem;
    }
    
    .hero-text {
        text-align: center;
        position: absolute;
        top: 50%;
        left: 50%;
        padding: 20px;
        transform: translate(-50%, -50%);
        color: rgb(255, 255, 255);
        transition: background-color 2s ease-out 200ms;
    }
    
    .hero-text:hover {
        display: block;
        background-color: #000000;
    }
</style>

<body>
    <nav class="navbar">

        <div class="logo"><img src="logo.gif" width="70" height="70"></div>

        <ul class="nav-links">

            <div class="menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </div>
        </ul>
    </nav>
    <div class="c">
        <section class="bgimage" id="home">
            <div class="container-fluid">
                <div class="row">

                </div>
            </div>
        </section>
        <div class="hero-text">
            <h2 class="hero_title">Hi, i'm justin </h2><br>
            <p class="hero_desc">I'm a Full Stack Developer</p>
        </div>
    </div>

</body>

</html>
